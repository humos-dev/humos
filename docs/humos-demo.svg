<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <style>
    @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin1 { 0% { opacity: 1; } 25% { opacity: 0; } }
    text { font-family: "SF Mono", "Fira Code", "Menlo", monospace; font-size: 13px; }
    .line { opacity: 0; animation: appear 0.1s ease-in forwards; }
    .spinner { animation: pulse 0.8s ease-in-out infinite; }
  </style>

  <!-- Terminal window -->
  <rect width="720" height="520" rx="8" fill="#0a0a0a"/>
  <rect width="720" height="32" rx="8" fill="#141414"/>
  <rect y="24" width="720" height="8" fill="#141414"/>
  <circle cx="16" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="6" fill="#febc2e"/>
  <circle cx="56" cy="16" r="6" fill="#28c840"/>
  <text x="360" y="20" fill="#666" text-anchor="middle" font-size="12">humOS v0.4.4</text>

  <!-- Install -->
  <text class="line" x="16" y="54" fill="#e8e8e8" font-weight="bold" style="animation-delay: 0.0s">$ brew install --cask humos</text>
  <text class="line" x="16" y="76" fill="#3ecf8e" style="animation-delay: 2.0s">  ==> humOS was successfully installed!</text>

  <!-- Open -->
  <text class="line" x="16" y="102" fill="#e8e8e8" font-weight="bold" style="animation-delay: 3.2s">$ open /Applications/humOS.app</text>

  <!-- Sessions detected -->
  <text class="line" x="16" y="128" fill="#3ecf8e" style="animation-delay: 4.2s">  ⌁ humOS</text>
  <text class="line spinner" x="16" y="146" fill="#666" style="animation-delay: 4.5s">  Scanning ~/.claude/projects/...</text>
  <text class="line" x="16" y="168" fill="#e8e8e8" style="animation-delay: 6.0s">  5 sessions detected:</text>
  <text class="line" x="16" y="190" fill="#999" style="animation-delay: 6.4s">    [1] checkout-flow    WAITING   87 tools    ~/shop/checkout</text>
  <text class="line" x="16" y="208" fill="#999" style="animation-delay: 6.7s">    [2] schema-migration IDLE      42 tools    ~/shop/db</text>
  <text class="line" x="16" y="226" fill="#999" style="animation-delay: 7.0s">    [3] api-endpoints    IDLE      156 tools   ~/shop/api</text>
  <text class="line" x="16" y="244" fill="#999" style="animation-delay: 7.3s">    [4] test-suite       IDLE      23 tools    ~/shop/tests</text>
  <text class="line" x="16" y="262" fill="#999" style="animation-delay: 7.6s">    [5] docs             IDLE      11 tools    ~/shop/docs</text>

  <!-- pipe() demo -->
  <text class="line" x="16" y="292" fill="#3ecf8e" font-weight="bold" style="animation-delay: 9.5s">  pipe()</text>
  <text class="line" x="16" y="310" fill="#e8e8e8" style="animation-delay: 10.0s">  Rule: when [2] schema-migration goes idle, tell [3] api-endpoints</text>
  <text class="line" x="16" y="328" fill="#e8e8e8" style="animation-delay: 10.3s">        "schema is done, update your endpoints to match"</text>
  <text class="line spinner" x="16" y="350" fill="#bd93f9" style="animation-delay: 11.3s">  ⠋ Watching schema-migration...</text>
  <text class="line" x="16" y="350" fill="#3ecf8e" style="animation-delay: 13.0s">  ✔ schema-migration went idle</text>
  <text class="line" x="16" y="368" fill="#3ecf8e" style="animation-delay: 13.5s">  ✔ Injected into api-endpoints (200ms)</text>
  <text class="line" x="16" y="386" fill="#666" style="animation-delay: 14.0s">    You didn't paste anything. It just happened.</text>

  <!-- signal() demo -->
  <text class="line" x="16" y="416" fill="#3ecf8e" font-weight="bold" style="animation-delay: 15.5s">  signal()</text>
  <text class="line" x="16" y="434" fill="#e8e8e8" style="animation-delay: 16.0s">  Broadcast: "stop. re-read schema.prisma. it changed."</text>
  <text class="line" x="16" y="456" fill="#3ecf8e" style="animation-delay: 17.0s">  ✔ 5/5 sessions received</text>
  <text class="line" x="16" y="474" fill="#666" style="animation-delay: 17.5s">    One click. Every session pivots. 2-second undo.</text>

  <!-- Closer -->
  <text class="line" x="16" y="504" fill="#3ecf8e" font-weight="bold" style="animation-delay: 19.0s">  You are no longer the glue between your AI sessions.</text>
</svg>
