<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Transparent background — macOS applies its own mask -->
  <!-- Solid black rounded rect matching macOS icon shape -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="#0a0a0a"/>

  <!-- Three bars — centered vertically and horizontally -->
  <!-- Left bar -->
  <rect x="287" y="496" width="120" height="310" rx="18" ry="18" fill="#5fffb8"/>
  <!-- Center bar — tallest -->
  <rect x="452" y="266" width="120" height="540" rx="18" ry="18" fill="#5fffb8"/>
  <!-- Right bar -->
  <rect x="617" y="396" width="120" height="410" rx="18" ry="18" fill="#5fffb8"/>
</svg>
