# Release humOS — unsigned macOS build
#
# Triggered by pushing a semver tag (v1.2.3) or manually via the Actions tab.
# Uses tauri-action to build and draft a GitHub Release with the .dmg attached.
# Review the draft, then hit Publish.
#
# NOT signed or notarized — no Apple Developer ID required.
# Users install via Homebrew (handles quarantine removal automatically) or
# run `xattr -cr /Applications/humOS.app` after manual .dmg install.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.0)"
        required: true

jobs:
  release:
    name: Build, sign, notarize, draft release
    # Apple Silicon runner — matches humOS's primary target audience.
    runs-on: macos-14

    permissions:
      contents: write  # needed to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "humOS ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            humOS ${{ github.event.inputs.tag || github.ref_name }}

            **Install via Homebrew (recommended):**
            ```
            brew tap humos-dev/humos && brew install --cask humos
            ```

            Or download the `.dmg` below, open it, drag humOS to Applications.
            Then run: `xattr -cr /Applications/humOS.app`
          releaseDraft: true
          prerelease: false
          includeRelease: true
          includeUpdaterJson: false

      - name: Create proper .dmg from .app bundle
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          APP_PATH="src-tauri/target/release/bundle/macos/humOS.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH, searching..."
            APP_PATH=$(find src-tauri/target -name "humOS.app" -type d | head -1)
          fi

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: humOS.app not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          DMG_NAME="humOS_${VERSION}_aarch64_install.dmg"

          # Create a temporary directory for the DMG contents
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/humOS.app"
          ln -s /Applications "$DMG_DIR/Applications"

          # Create the .dmg with hdiutil
          hdiutil create -volname "humOS" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf "$DMG_DIR"
          echo "Created: $DMG_NAME ($(du -h "$DMG_NAME" | cut -f1))"
          echo "DMG_PATH=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload .dmg to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" "${{ env.DMG_PATH }}" --clobber
